<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Supreme Palace</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

.hero{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
    url('pix1.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    position:relative;
}

.top-bar{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.restaurant-name{
    background:#000;
    padding:10px 18px;
    font-size:15px;
}

.notification{
    width:55px;
    height:55px;
    border:3px solid #fff;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    cursor:pointer;
}

.logo{
    margin-top:90px;
    width:220px;
    height:220px;
    background:#fff;
    border-radius:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.logo img{
    width:85%;
}

.welcome{
    text-align:center;
    margin-top:30px;
}

.welcome h1{
    font-size:70px;
    font-weight:bold;
}

.welcome p{
    font-size:18px;
    color:#ddd;
    margin-top:10px;
}

.menu-section{
    width:100%;
    max-width:500px;
    margin-top:35px;
}

.menu-btn{
    width:100%;
    height:85px;
    margin-bottom:20px;
    border:2px solid #8a6728;
    border-radius:50px;
    background:rgba(0,0,0,.45);
    color:#fff;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.menu-btn:hover{
    background:#8a6728;
}

.footer-note{
    margin-top:40px;
    text-align:center;
    line-height:1.7;
    font-size:16px;
    color:#ddd;
    padding:0 20px;
}

.footer-note strong{
    color:#fff;
}

@media(max-width:600px){

.logo{
    width:170px;
    height:170px;
}

.welcome h1{
    font-size:50px;
}

.menu-btn{
    height:75px;
    font-size:18px;
}

}

</style>
</head>
<body>

<section class="hero">

<div class="top-bar">

<div class="restaurant-name">

</div>

<div class="notification">
<i class="fas fa-bell"></i>
</div>

</div>

<div class="lo">
<img src="pix1.jpg" width="100%" height="100%">
</div>


<div class="menu-section">
   <button class="menu-btn" onclick="window.location.href='foodmenu.html'">
    Food Menu
</button>
    
    <div class="menu-section">
   <button class="menu-btn" onclick="window.location.href='drinkmenu.html'">
    Drinks Menu
</button>
   
   
    <div class="menu-section">
   <button class="menu-btn" onclick="window.location.href='Feedback.html'">
    Customer Feedback
</button>

</div>

<div class="footer-note">
<p>

<strong>De Supreme Palace Restaurant</strong>
</p>

</div>

</section>

<script>

function openMenu(menu){

    switch(menu){

        case "Food Menu":
            alert("Open Food Menu");
        break;

        case "Drinks Menu":
            alert("Open Drinks Menu");
        break;

        case "Customer Feedback":
            alert("Open Customer Feedback");
        break;

        
    }
}

document.querySelector('.notification')
.addEventListener('click',function(){
    alert('Notifications');
});

</script>

</body>
</html>
