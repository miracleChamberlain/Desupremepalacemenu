<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Supreme Palace</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* LOADER */
#loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:#05061a;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.container{
    width:100%;
    max-width:420px;
    text-align:center;
}

.circle{
    width:180px;
    height:180px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(145deg,#262a52,#11152f);
    display:flex;
    justify-content:center;
    align-items:center;
}

.hourglass{
    font-size:70px;
    color:#ff7b00;
    animation:spin 2s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.loading{
    margin-top:20px;
}

.loading span{
    width:12px;
    height:12px;
    background:#ff7b00;
    border-radius:50%;
    display:inline-block;
    margin:0 5px;
    animation:bounce 1.5s infinite;
}

.loading span:nth-child(2){
    animation-delay:.2s;
}

.loading span:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
        opacity:.3;
    }
    50%{
        transform:translateY(-10px);
        opacity:1;
    }
}

/* MAIN PAGE */
#mainPage{
    display:none;
}

body{
    background:#000;
    color:#fff;
}

.hero{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
    url('pix1.jpg');
    background-size:cover;
    background-position:center;
    padding:20px;
}

.top-bar{
    display:flex;
    justify-content:flex-end;
}

.notification{
    width:55px;
    height:55px;
    border:3px solid #fff;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.lo{
    width:220px;
    height:220px;
    margin:60px auto 30px;
    overflow:hidden;
    border-radius:20px;
}

.lo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.menu-section{
    max-width:500px;
    margin:auto;
}

.menu-btn{
    width:100%;
    height:80px;
    margin-bottom:20px;
    border:2px solid #8a6728;
    border-radius:50px;
    background:rgba(0,0,0,.4);
    color:#fff;
    font-size:20px;
    cursor:pointer;
}

.menu-btn:hover{
    background:#8a6728;
}

.footer-note{
    text-align:center;
    margin-top:30px;
    font-size:20px;
}

</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loader">

    <div class="container">

        <div class="circle">
            <i class="fas fa-hourglass-half hourglass"></i>
        </div>

        <h1 id="loadingText" style="margin-top:20px;">
            De Supreme Palace
        </h1>

        <div class="loading">
            <span></span>
            <span></span>
            <span></span>
        </div>

    </div>

</div>

<!-- MAIN PAGE -->
<div id="mainPage">

<section class="hero">

    <div class="top-bar">
        <div class="notification">
            <i class="fas fa-bell"></i>
        </div>
    </div>

    <div class="lo">
        <img src="pix1.jpg" alt="Logo">
    </div>

    <div class="menu-section">

        <button class="menu-btn"
        onclick="window.location.href='foodmenu.html'">
        Food Menu
        </button>

        <button class="menu-btn"
        onclick="window.location.href='drinkmenu.html'">
        Drinks Menu
        </button>

        <button class="menu-btn"
        onclick="window.location.href='feedback.html'">
        Customer Feedback
        </button>

    </div>

    <div class="footer-note">
        <strong>De Supreme Palace Restaurant</strong>
    </div>

</section>

</div>

<script>

// Loading text animation
let dots = 0;

setInterval(() => {
    dots = (dots + 1) % 4;
    document.getElementById("loadingText").innerHTML =
    "De Supreme Palace" + ".".repeat(dots);
}, 500);

// Show main page after 4 seconds
setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
}, 4000);

</script>

</body>
</html>
